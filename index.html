<!DOCTYPE html>
<html lang="en">

<!-- Head - includes main.js, d3.js, and style.css -->
<head>
    <meta charset="UTF-8">
    <title>Project 3</title>
    <script type="module" src="main.js"></script>
    <link rel="stylesheet" href="style.css">
	<!-- Load d3.js -->
	<script src="https://d3js.org/d3.v4.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<!-- Body - Made of mostly containers that will be filled by main.js -->
<body>
    <header>
        <div class="row">
            <h1>Project 3 - CIS 569 - Abby and Jacob Matos - Cluster by Country</h1>
            <button id="swapButton">Swap to Plot</button>
        </div>
        <div class="horizontalLine"></div>
    </header>
    <div class="row">
        <!-- Container for the file names -->
        <div id="filesContainer" class="filesContainer">
            <h2>Files</h2>  
            <h3>Number of Clusters = 25</h3>
            <div class="horizontalLine"></div>
            <div class="spacer"></div>
        </div>
        <!-- Container for the file workspaces -->
        <div id="workspaceContainer" class="workspaceContainer"></div>
        <!-- Container for the plot -->
        <div id="plotContainer" class="plotContainer" style="display: none;">
            <!-- Create a div where the graph will take place -->
            <div id="my_dataviz"></div>
        </div>
    </div>
</body>

<script>

// set the dimensions and margins of the graph
var margin = {top: 10, right: 30, bottom: 30, left: 60},
    width = 900 - margin.left - margin.right,
    height = 900 - margin.top - margin.bottom;

// append the svg object to the body of the page
var svg = d3.select("#my_dataviz")
  .append("svg")
    .attr("width", width + margin.left + margin.right)
    .attr("height", height + margin.top + margin.bottom)
	.attr("style", "background-color: white")
  .append("g")
    .attr("transform",
          "translate(" + margin.left + "," + margin.top + ")");

//Read the data
d3.csv("MDS.csv", function(data) {

console.log(data)

  // Add X axis
  var x = d3.scaleLinear()
    .domain([-2400, 100])
    .range([ 0, width ]);
  svg.append("g")
    .attr("transform", "translate(0," + height + ")")
    .call(d3.axisBottom(x));

  // Add Y axis
  var y = d3.scaleLinear()
    .domain([-100, 2400])
    .range([ height, 0]);
  svg.append("g")
    .call(d3.axisLeft(y));

  // Add a tooltip div. Here I define the general feature of the tooltip: stuff that do not depend on the data point.
  // Its opacity is set to 0: we don't see it by default.
  var tooltip = d3.select("#my_dataviz")
    .append("div")
    .style("opacity", 0)
    .attr("class", "tooltip")
    .style("background-color", "white")
    .style("border", "solid")
    .style("border-width", "1px")
    .style("border-radius", "5px")
    .style("padding", "10px")



  // A function that change this tooltip when the user hover a point.
  // Its opacity is set to 1: we can now see it. Plus it set the text and position of tooltip depending on the datapoint (d)
  var mouseover = function(d) {
    tooltip
      .style("opacity", 1)
  }

  var mousemove = function(d) {
    tooltip
      .html("File " + d.FileNames + ": " + d.x + ", " + d.y)
      .style("left", (d3.mouse(this)[0]+90) + "px") // It is important to put the +90: other wise the tooltip is exactly where the point is an it creates a weird effect
      .style("top", (d3.mouse(this)[1]) + "px")
  }

  // A function that change this tooltip when the leaves a point: just need to set opacity to 0 again
  var mouseleave = function(d) {
    tooltip
      .transition()
      .duration(200)
      .style("opacity", 0)
  }

  // Add dots
  svg.append('g')
    .selectAll("dot")
    .data(data)
    .enter()
    .append("circle")
      .attr("cx", function (d) { return x(d.x); } )
      .attr("cy", function (d) { return y(d.y); } )
      .attr("r", 7)
      .style("fill", function (d) {
		if ((d.FileNames.indexOf("docs") !== -1)) {
			return "#69b3a2"
		}
		else {
			return "#b3b3b3"
		}
	  })
      .style("opacity", 0.5)
      .style("stroke", "white")
    .on("mouseover", mouseover )
    .on("mousemove", mousemove )
    .on("mouseleave", mouseleave )

})

</script>

</html>
