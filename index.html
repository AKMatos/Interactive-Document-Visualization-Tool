<!DOCTYPE html>
<html lang="en">

<!-- Head - includes main.js, d3.js, and style.css -->
<head>
    <meta charset="UTF-8">
    <title>Project 3</title>
    <script type="module" src="main.js"></script>
    <link rel="stylesheet" href="style.css">
	<!-- Load d3.js -->
	<script src="https://d3js.org/d3.v4.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<!-- Body - Made of mostly containers that will be filled by main.js -->
<body>
    <header>
        <div class="row">
            <h1>Project 3 - CIS 569 - Abby and Jacob Matos - Cluster by Country</h1>
            <button id="swapButton">Swap to Plot</button>
        </div>
        <div class="horizontalLine"></div>
    </header>
    <div class="row">
        <!-- Container for the file names -->
        <div id="filesContainer" class="filesContainer">
            <h2>Files</h2>  
            <h3>Number of Clusters = 25</h3>
            <div class="horizontalLine"></div>
            <div class="spacer"></div>
        </div>
        <!-- Container for the file workspaces -->
        <div id="workspaceContainer" class="workspaceContainer"></div>
        <!-- Container for the plot -->
        <div id="plotContainer" class="plotContainer" style="display: none;">
            <!-- Create a div where the graph will take place -->
            <div id="my_dataviz"></div>
        </div>
    </div>
</body>
</html>
