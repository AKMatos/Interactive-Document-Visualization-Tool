<body>

    <div class="row">
        <div id="filesContainer" class="filesContainer">
            <h2>Files</h2>
            <div class="spacer"></div>
        </div>
        <div class="workspaceContainer">
            <div class="workspace">
                <h2>Workspace</h2>
                <p id ="text"></p>
            </div>
            <div class="workspace">
                <h2>Workspace</h2>
                <p>Test</p>
            </div>

<script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

//     $.get('dataset/CIA_03', function(data) {
//         document.getElementById("text").innerHTML = "<p>" + data + "</p>";
//         console.log(data)
//     }, 'text');
//  //  ^------last argument

    let fileContainer = document.getElementById("filesContainer")

    d3.csv("datasetAsCSV.csv",d=>{
        return{
            fileName: String(d.FileNames),
            fileContents: String(d.FileContents),
        }
    }).then(data=>{
        console.log(data[0].fileContents)
        for (let i = 0; i < data.length; i++) {
            let p = document.createElement("button");
            p.setAttribute("type", "fileButton")
            p.setAttribute("onclick", "fileClick()")
            let node = document.createTextNode(data[i].fileName);
            p.appendChild(node);
            fileContainer.append(p);
        }
    });
</script>

</html>
